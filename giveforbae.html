<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快樂 ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffe5ec;
            --primary: #ff4d6d;
            --secondary: #ff85a1;
            --accent: #ffb3c6;
            --card: #ffffff;
            --text: #5a3a3a;
            --sub: #b07070;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 20% 20%, var(--accent) 0%, transparent 50%),
                              radial-gradient(circle at 80% 80%, var(--secondary) 0%, transparent 50%);
            font-family: 'Nunito', 'Microsoft JhengHei', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 0.5s, background-image 0.5s;
        }

        .container {
            background: var(--card);
            padding: 36px 30px;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            width: 92%;
            max-width: 480px;
            text-align: center;
            position: relative;
            transition: all 0.3s;
        }

        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }

        @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

        h1 { font-family: 'Noto Serif TC', serif; font-size: 1.8rem; color: var(--primary); margin-bottom: 8px; }
        h2 { font-family: 'Noto Serif TC', serif; font-size: 1.4rem; color: var(--primary); margin-bottom: 16px; }
        p  { color: var(--sub); font-size: 0.95rem; margin-bottom: 12px; }

        /* ── Buttons ── */
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            border: none;
            padding: 13px 28px;
            margin: 7px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 14px rgba(0,0,0,0.12);
        }
        .btn:hover  { opacity: 0.88; transform: scale(1.05); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        .btn:active { transform: scale(0.97); }
        .btn.outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            box-shadow: none;
        }
        .btn.outline:hover { background: var(--accent); }

        /* ── Game Canvas ── */
        canvas {
            background: #fff9fb;
            border: 2px solid var(--accent);
            border-radius: 14px;
            display: block;
            margin: 0 auto 14px;
            max-width: 100%;
            touch-action: none;
        }

        /* ── Chat / message box ── */
        .msg-box {
            text-align: left;
            background: linear-gradient(135deg, #fff0f3, #fff5f8);
            padding: 18px 20px;
            border-radius: 14px;
            border-left: 5px solid var(--primary);
            margin: 18px 0;
            min-height: 90px;
            color: var(--text);
            font-size: 0.97rem;
            line-height: 1.7;
        }

        /* ── Secret tag ── */
        .secret-tag {
            display: inline-block;
            background: #f2f2f2;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            color: #aaa;
            letter-spacing: 0.08em;
        }

        /* ── Settings page ── */
        .settings-section {
            margin-bottom: 22px;
            text-align: left;
        }
        .settings-label {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--sub);
            margin-bottom: 10px;
        }
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .theme-card {
            border-radius: 14px;
            padding: 12px 8px;
            cursor: pointer;
            border: 2.5px solid transparent;
            transition: all 0.2s;
            text-align: center;
            font-size: 0.78rem;
            font-weight: 700;
        }
        .theme-card:hover { transform: scale(1.05); }
        .theme-card.active-theme { border-color: var(--primary); box-shadow: 0 0 0 3px var(--accent); }
        .theme-swatch {
            width: 38px; height: 38px;
            border-radius: 50%;
            margin: 0 auto 6px;
            border: 2px solid rgba(0,0,0,0.06);
        }

        /* ── Input ── */
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid var(--accent);
            font-size: 1rem;
            font-family: inherit;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        /* ── Overlay / popup ── */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(80,20,30,0.35);
            display: flex; align-items: center; justify-content: center;
            z-index: 999;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.25s ease;
        }
        .overlay-card {
            background: white;
            border-radius: 28px;
            padding: 36px 30px;
            max-width: 340px;
            width: 88%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
            animation: popIn 0.3s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes popIn { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }
        .overlay-emoji { font-size: 3rem; margin-bottom: 10px; }
        .overlay-title { font-family: 'Noto Serif TC', serif; color: var(--primary); font-size: 1.4rem; margin-bottom: 10px; }
        .overlay-msg { color: var(--sub); font-size: 0.95rem; line-height: 1.7; margin-bottom: 20px; }

		.mini-popup {
			display: none;
			position: absolute;
			white-space: nowrap;
			top: 20%; 
			left: -100%; /* Start off-screen left */
			background: var(--primary);
			color: white;
			padding: 12px 25px;
			border-radius: 50px;
			box-shadow: 0 10px 20px rgba(0,0,0,0.15);
			z-index: 100;
			font-weight: bold;
			pointer-events: none; /* So it doesn't block mouse/touch */
		}

		/* The animation: slide from left to right and fade out */
		@keyframes flyAcross {
			0% { left: -50%; opacity: 0; }
			10% { opacity: 1; }
			90% { opacity: 1; }
			100% { left: 100%; opacity: 0; }
		}
		
        /* ── Divider ── */
        hr { border: none; border-top: 1.5px solid #f0e0e5; margin: 18px 0; }

        /* ── Menu decoration ── */
        .heart-row { font-size: 1.4rem; letter-spacing: 6px; margin-bottom: 6px; }
        .subtitle { font-size: 0.88rem; color: var(--sub); margin-bottom: 24px; }
    </style>
</head>
<body>
<div class="container">

    <!-- ══ MENU ══ -->
    <div id="view-menu" class="view active">
        <div class="heart-row">🌸 ❤️ 🌸</div>
        <h1>芋頭生日快樂</h1>
        <p class="subtitle">打破方塊，解鎖一句悄悄話 💌</p>
        <br>
        <button class="btn" onclick="showView('view-game'); initGame();">🎮 開始遊戲</button><br>
        <button class="btn outline" onclick="showView('view-settings')">⚙️ 設定</button>
    </div>

    <!-- ══ SETTINGS ══ -->
    <div id="view-settings" class="view">
        <h2>⚙️ 設定</h2>

        <div class="settings-section">
            <div class="settings-label">🎨 選擇主題顏色</div>
            <div class="theme-grid" id="themeGrid"></div>
        </div>

        <hr>

        <div class="settings-section">
            <div class="settings-label">🔒 秘密訊息</div>
            <button class="btn" onclick="showView('view-secret')" style="width:100%; margin:0;">輸入秘密代碼解鎖</button>
        </div>

        <hr>
        <button class="btn outline" onclick="showView('view-menu')">← 返回主選單</button>
    </div>

    <!-- ══ GAME ══ -->
    <div id="view-game" class="view">
        <p style="margin-bottom:8px;">打破所有方塊來解鎖訊息！</p>
		<div id="block-counter" style="font-weight:bold; color:var(--primary); margin-bottom:10px;">剩餘方塊: 24</div>
        <canvas id="gameCanvas" width="420" height="300"></canvas>
		<div id="mini-popup" 
			 style="display:none; 
			 position:absolute; 
			 top:20%; left:50%; 
			 transform:translate(-50%,-50%); 
			 background:var(--primary); 
			 color:white; 
			 padding:15px; 
			 border-radius:15px; z-index:100;">
		</div>
        <button class="btn outline" style="font-size:0.85rem; padding:9px 20px;" onclick="showView('view-menu')">🏳️ 放棄</button>
    </div>

    <!-- ══ WIN ══ -->
    <div id="view-win" class="view">
        <div style="font-size:2.5rem; margin-bottom:8px;">🎉</div>
        <h2>你贏了！</h2>
        <p>解鎖成功，這是給妳的話：</p>
        <div class="msg-box">
            <!-- ✏️ 在這裡填上你對她說的話 -->
            嘿嘿妳過關了喔，玩完後感覺如何？<br>
            謝謝妳進入了我的世界，妳是宇宙給我的生日禮物<br>
			我很喜歡這份禮物，我會盡我所能給你我的幸福<br>
            生日快樂，我愛你3000。
        </div>
        <div class="secret-tag">秘密代碼：9420</div>
        <br><br>
        <button class="btn" onclick="showView('view-menu')">回到選單</button>
    </div>

    <!-- ══ SECRET ══ -->
    <div id="view-secret" class="view">
        <div style="font-size:2rem; margin-bottom:6px;">🔐</div>
        <h2>加密訊息</h2>
        <p>輸入秘密代碼來解鎖彩蛋</p>
        <input type="text" id="passInput" placeholder="輸入代碼..." maxlength="10">
        <button class="btn" onclick="checkSecret()" style="width:100%; margin:0 0 10px;">解鎖</button>

        <div id="secret-content" style="display:none;">
            <div class="msg-box" style="border-left-color: goldenrod; background: linear-gradient(135deg,#fffde7,#fff8e1);">
                <!-- ✏️ 第二段秘密話語 -->
                這段話只有知道代碼的妳才能看到 ✨<br>
                妳是我最珍貴的秘密，也是我最想大聲說出口的名字。<br>
                永遠愛妳。💛
            </div>
        </div>

        <button class="btn outline" style="margin-top:10px;" onclick="showView('view-settings')">← 返回</button>
    </div>
</div>

<!-- ══ LOSE OVERLAY ══ -->
<div id="loseOverlay" class="overlay" style="display:none;" onclick="closeLoseOverlay()">
    <div class="overlay-card" onclick="event.stopPropagation()">
        <div class="overlay-emoji" id="loseEmoji">💪</div>
        <div class="overlay-title" id="loseTitle">沒關係！</div>
        <div class="overlay-msg" id="loseMsg">妳已經盡力了，再試一次吧！</div>
        <button class="btn" onclick="closeLoseOverlay(); initGame();">再試一次 ✨</button>
        <br>
        <button class="btn outline" style="font-size:0.85rem; padding:9px 20px; margin-top:6px;" onclick="closeLoseOverlay(); showView('view-menu')">回選單</button>
    </div>
</div>

<script>
// ──────────────────────────────────────────────
//  THEMES
// ──────────────────────────────────────────────
const themes = [
    { name:'愛你我看到的顏色', bg:'#ffe5ec', primary:'#ff4d6d', secondary:'#ff85a1', accent:'#ffb3c6', text:'#5a3a3a', sub:'#b07070', swatch:'#ff85a1' },
    { name:'妳喜歡的顏色', bg:'#e0d1ff', primary:'#4a148c', secondary:'#7e57c2', accent:'#d1b3ff', text:'#1a0b3a', sub:'#5c3a7a', swatch:'#7e57c2' },
    { name:'我喜歡的顏色', bg:'#e0f2fe', primary:'#0284c7', secondary:'#38bdf8', accent:'#bae6fd', text:'#1a3a5a', sub:'#5090b0', swatch:'#38bdf8' },
    { name:'率色，好像不是這個率', bg:'#ecfdf5', primary:'#059669', secondary:'#34d399', accent:'#a7f3d0', text:'#1a3a2a', sub:'#409070', swatch:'#34d399' },
    { name:'橘子好吃，我喜歡蘋果', bg:'#fff7ed', primary:'#ea580c', secondary:'#fb923c', accent:'#fed7aa', text:'#4a2a1a', sub:'#b06040', swatch:'#fb923c' },
    { name:'只想給你玫瑰', bg:'#fdf4f5', primary:'#be185d', secondary:'#ec4899', accent:'#fbcfe8', text:'#4a1a2a', sub:'#905060', swatch:'#ec4899' },
];
let paused = false; // Add this near your other let variables

function showMiniPopup(text) {
    const popup = document.getElementById('mini-popup');
    popup.textContent = text;
    popup.style.display = 'block';
    paused = true; // Stops the ball
	
	popup.style.animation = 'none';
    popup.offsetHeight; // Trigger reflow to restart animation
    
    // Apply the 3-second flying animation
    popup.style.animation = 'flyAcross 5s linear forwards';
	
    setTimeout(() => {
        popup.style.display = 'none';
    }, 5000);
}

let activeThemeIdx = 0;

function applyTheme(idx) {
    const t = themes[idx];
    activeThemeIdx = idx;
    const r = document.documentElement.style;
    r.setProperty('--bg', t.bg);
    r.setProperty('--primary', t.primary);
    r.setProperty('--secondary', t.secondary);
    r.setProperty('--accent', t.accent);
    r.setProperty('--text', t.text);
    r.setProperty('--sub', t.sub);
    document.querySelectorAll('.theme-card').forEach((el,i) => {
        el.classList.toggle('active-theme', i === idx);
    });
}

function buildThemeGrid() {
    const grid = document.getElementById('themeGrid');
    themes.forEach((t, i) => {
        const card = document.createElement('div');
        card.className = 'theme-card' + (i === 0 ? ' active-theme' : '');
        card.style.background = t.bg;
        card.style.color = t.primary;
        card.innerHTML = `<div class="theme-swatch" style="background:${t.swatch}"></div>${t.name}`;
        card.onclick = () => applyTheme(i);
        grid.appendChild(card);
    });
}
buildThemeGrid();

// ──────────────────────────────────────────────
//  VIEWS
// ──────────────────────────────────────────────
function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ──────────────────────────────────────────────
//  SECRET
// ──────────────────────────────────────────────
function checkSecret() {
    const val = document.getElementById('passInput').value.trim();
    if (val === '9420') {
        document.getElementById('secret-content').style.display = 'block';
    } else {
        showLose('再試一次 🔑', '代碼好像不對耶', '🤔');
    }
}

// ──────────────────────────────────────────────
//  LOSE OVERLAY
// ──────────────────────────────────────────────
const encouragements = [
    { emoji:'💪', title:'沒關係！', msg:'芋頭已經很棒了，再試一次吧！每次練習會讓妳更厲害 ' },
    { emoji:'🌸', title:'芋頭加油！', msg:'失敗是成功之母，愛妳是我做過最正確的選擇！再來一次 ' },
    { emoji:'🎀', title:'不要放棄！', msg:'就差一點點了，我相信妳一定可以的！' },
    { emoji:'⭐', title:'再試一次！', msg:'妳是最可愛的挑戰者，這次一定沒問題！' },
    { emoji:'🌟', title:'芋頭最棒了！', msg:'方塊沒問題的，妳有問題嗎? 沒有請繼續 ' },
];
let loseCount = 0;
let loseCallback = null;

function showLose(title, msg, emoji) {
    const el = document.getElementById('loseOverlay');
    document.getElementById('loseEmoji').textContent = emoji || '💪';
    document.getElementById('loseTitle').textContent = title;
    document.getElementById('loseMsg').textContent = msg;
    el.style.display = 'flex';
}

function showGameLose() {
    const e = encouragements[loseCount % encouragements.length];
    loseCount++;
    document.getElementById('loseEmoji').textContent = e.emoji;
    document.getElementById('loseTitle').textContent = e.title;
    document.getElementById('loseMsg').textContent = e.msg;
    document.getElementById('loseOverlay').style.display = 'flex';
}

function closeLoseOverlay() {
    document.getElementById('loseOverlay').style.display = 'none';
}

// ──────────────────────────────────────────────
//  GAME
// ──────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const BALL_R   = 8;
const PAD_W    = 80;
const PAD_H    = 10;
const COLS     = 6;
const ROWS     = 4;
const BRICK_W  = 58;
const BRICK_H  = 18;
const BRICK_GAP= 8;
let x, y, dx, dy, paddleX, bricks, running;

function initGame() {
	this.msg12 = false;
    this.msg6 = false;
    this.msg3 = false;
	
    x = canvas.width / 2;
    y = canvas.height - 50;
    dx = 2.8; dy = -2.8;
    paddleX = (canvas.width - PAD_W) / 2;
    bricks = [];
    for (let c = 0; c < COLS; c++) {
        bricks[c] = [];
        for (let r = 0; r < ROWS; r++) bricks[c][r] = { x:0, y:0, status:1 };
    }
    running = true;
    requestAnimationFrame(draw);
}

function getPrimary() {
    return getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
}
function getSecondary() {
    return getComputedStyle(document.documentElement).getPropertyValue('--secondary').trim();
}
function getAccent() {
    return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
}

function draw() {
    if (!document.getElementById('view-game').classList.contains('active')) { running = false; return; }
    if (!running) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Ball
    ctx.beginPath();
    ctx.arc(x, y, BALL_R, 0, Math.PI * 2);
    ctx.fillStyle = getPrimary();
    ctx.fill();
    ctx.closePath();

    // Paddle
    ctx.beginPath();
    ctx.roundRect(paddleX, canvas.height - PAD_H - 6, PAD_W, PAD_H, 5);
    ctx.fillStyle = getPrimary();
    ctx.fill();
    ctx.closePath();

    // Bricks
    let remaining = 0;
    const offsetX = (canvas.width - COLS * (BRICK_W + BRICK_GAP) + BRICK_GAP) / 2;
    for (let c = 0; c < COLS; c++) {
        for (let r = 0; r < ROWS; r++) {
            const b = bricks[c][r];
            if (b.status !== 1) continue;
            remaining++;
            b.x = offsetX + c * (BRICK_W + BRICK_GAP);
            b.y = 28 + r * (BRICK_H + BRICK_GAP);
            const alpha = 1 - r * 0.15;
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.roundRect(b.x, b.y, BRICK_W, BRICK_H, 5);
            ctx.fillStyle = r < 2 ? getPrimary() : getSecondary();
            ctx.fill();
            ctx.closePath();
            ctx.globalAlpha = 1;

            if (x > b.x && x < b.x + BRICK_W && y > b.y && y < b.y + BRICK_H) {
                dy = -dy; b.status = 0;
            }
        }
    }
	document.getElementById('block-counter').textContent = `剩餘方塊: ${remaining}`;

    // Trigger messages (using flags so they only pop up once)
    if (remaining === 12 && !this.msg12) { showMiniPopup("一半了！加油 "); this.msg12 = true; }
    if (remaining === 6 && !this.msg6) { showMiniPopup("快成功了！芋頭加油"); this.msg6 = true; }
    if (remaining === 3 && !this.msg3) { showMiniPopup("最後三個！衝啊！"); this.msg3 = true; }
	
    if (remaining === 0) { running = false; showView('view-win'); return; }

    // Wall bounce
    if (x + dx > canvas.width - BALL_R || x + dx < BALL_R) dx = -dx;
    if (y + dy < BALL_R) dy = -dy;
    else if (y + dy > canvas.height - BALL_R - PAD_H - 6) {
        if (x > paddleX && x < paddleX + PAD_W) {
            dy = -Math.abs(dy);
        } else if (y + dy > canvas.height - BALL_R) {
            // LOST
            running = false;
            showGameLose();
            return;
        }
    }

    x += dx; y += dy;
    requestAnimationFrame(draw);
}

// Mouse control
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    paddleX = (e.clientX - rect.left) * scaleX - PAD_W / 2;
    paddleX = Math.max(0, Math.min(canvas.width - PAD_W, paddleX));
});

// Touch control
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    paddleX = (e.touches[0].clientX - rect.left) * scaleX - PAD_W / 2;
    paddleX = Math.max(0, Math.min(canvas.width - PAD_W, paddleX));
}, { passive: false });
</script>
</body>
</html>
